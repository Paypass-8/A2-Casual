/* ═══════════════════════════════════════════
   VARIABLES - COULEURS PERSONNALISABLES
   Changez les valeurs ci-dessous pour 
   modifier l'apparence de la page
   ═══════════════════════════════════════════ */
:root {
  /* ▼▼▼ COULEUR PRINCIPALE DE LA MARQUE ▼▼▼ */
  --brand-color: #e63946;
  --brand-color-light: #f4a261;
  /* ▲▲▲ Changez ces couleurs pour personnaliser ▲▲▲ */

  --bg-dark: #0a0a0a;
  --bg-card: rgba(255,255,255,0.03);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.7);
  --text-muted: rgba(255,255,255,0.45);
  --border: rgba(255,255,255,0.08);
  --glow: rgba(230, 57, 70, 0.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   ANIMATED BACKGROUND - Floating Particles
   ═══════════════════════════════════════════ */
.bg-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(230,57,70,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(244,162,97,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(230,57,70,0.08) 0%, transparent 50%),
    linear-gradient(180deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
}

/* Animated gradient orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  animation: orbFloat 20s ease-in-out infinite;
}

.orb-1 {
  width: 400px;
  height: 400px;
  background: var(--brand-color);
  top: -10%;
  left: -10%;
  animation-delay: 0s;
}

.orb-2 {
  width: 300px;
  height: 300px;
  background: var(--brand-color-light);
  top: 60%;
  right: -5%;
  animation-delay: -7s;
  animation-duration: 25s;
}

.orb-3 {
  width: 250px;
  height: 250px;
  background: var(--brand-color);
  bottom: -5%;
  left: 30%;
  animation-delay: -14s;
  animation-duration: 22s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.1); }
  50% { transform: translate(-30px, 50px) scale(0.95); }
  75% { transform: translate(20px, 20px) scale(1.05); }
}

/* Particle canvas */
#particles-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════════ */
.main-container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 40px 20px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ═══════════════════════════════════════════
   PROFILE SECTION
   ═══════════════════════════════════════════ */
.profile-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
  animation: fadeInDown 0.8s ease-out;
}

/* Rotating ring around avatar */
.avatar-container {
  position: relative;
  width: 130px;
  height: 130px;
  margin-bottom: 20px;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--brand-color);
  border-right-color: var(--brand-color-light);
  animation: ringRotate 4s linear infinite;
}

.avatar-ring-2 {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: var(--brand-color);
  border-left-color: var(--brand-color-light);
  animation: ringRotateReverse 6s linear infinite;
  opacity: 0.6;
}

@keyframes ringRotate {
  to { transform: rotate(360deg); }
}

@keyframes ringRotateReverse {
  to { transform: rotate(-360deg); }
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 40px rgba(230,57,70,0.2), 0 10px 40px rgba(0,0,0,0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.avatar-container:hover .avatar {
  transform: scale(1.05);
  box-shadow: 0 0 60px rgba(230,57,70,0.3), 0 15px 50px rgba(0,0,0,0.6);
}

/* LIVE Badge */
.live-badge {
  position: absolute;
  bottom: 5px;
  right: 5px;
  background: #22c55e;
  color: white;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 20px;
  border: 2px solid var(--bg-dark);
  display: flex;
  align-items: center;
  gap: 4px;
  animation: pulse 2s ease-in-out infinite;
  z-index: 2;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: blink 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Brand Name */
.brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--brand-color-light) 50%, var(--brand-color) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.brand-tagline {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 400;
}

/* ═══════════════════════════════════════════
   VISITOR COUNTER
   ═══════════════════════════════════════════ */
.visitor-counter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 16px 0 8px;
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  color: var(--text-secondary);
  backdrop-filter: blur(10px);
  animation: fadeIn 1s ease-out 0.3s both;
}

.visitor-counter i {
  color: var(--brand-color);
  font-size: 11px;
}

#visitor-count {
  font-weight: 700;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

/* ═══════════════════════════════════════════
   PRODUCT GALLERY - Horizontal Scroll
   ═══════════════════════════════════════════ */
.gallery-section {
  width: 100%;
  margin: 24px 0;
  animation: fadeIn 1s ease-out 0.5s both;
}

.gallery-title {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  text-align: center;
  font-weight: 500;
}

.gallery-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 4px 4px 16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.gallery-scroll::-webkit-scrollbar {
  display: none;
}

.gallery-item {
  flex: 0 0 auto;
  width: 140px;
  height: 170px;
  border-radius: 16px;
  overflow: hidden;
  scroll-snap-align: start;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

.gallery-item:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 10px 30px rgba(230,57,70,0.2);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

.gallery-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   LINK BUTTONS
   ═══════════════════════════════════════════ */
.links-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 8px 0;
}

/* Link Button Style */
.link-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 22px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  text-decoration: none;
  color: var(--text-primary);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  backdrop-filter: blur(20px);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideInLeft 0.6s ease-out both;
}

.link-btn:nth-child(1) { animation-delay: 0.1s; }
.link-btn:nth-child(2) { animation-delay: 0.2s; }
.link-btn:nth-child(3) { animation-delay: 0.3s; }
.link-btn:nth-child(4) { animation-delay: 0.4s; }

/* Shine effect overlay */
.link-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  transition: left 0.6s ease;
}

.link-btn:hover::before {
  left: 100%;
}

/* Glow border on hover */
.link-btn::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--brand-color), var(--brand-color-light));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.link-btn:hover::after {
  opacity: 1;
}

.link-btn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 8px 32px rgba(230,57,70,0.15);
}

/* Icon container */
.link-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: transform 0.3s ease;
}

.link-btn:hover .link-icon {
  transform: scale(1.1);
}

/* Icon backgrounds */
.icon-shop { background: linear-gradient(135deg, #96f7c8, #00c853); color: #0a0a0a; }
.icon-insta { background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7); color: white; }
.icon-tiktok { background: linear-gradient(135deg, #00f2ea, #ff0050); color: white; }
.icon-fb { background: linear-gradient(135deg, #1877f2, #42a5f5); color: white; }

/* Link text */
.link-text {
  flex: 1;
}

.link-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
}

/* Arrow */
.link-arrow {
  font-size: 12px;
  color: var(--text-muted);
  transition: all 0.3s ease;
}

.link-btn:hover .link-arrow {
  transform: translateX(4px);
  color: var(--brand-color);
}

/* ═══════════════════════════════════════════
   DIVIDER
   ═══════════════════════════════════════════ */
.divider {
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, var(--brand-color), var(--brand-color-light));
  border-radius: 10px;
  margin: 20px auto;
  animation: fadeIn 1s ease-out 0.6s both;
}

/* ═══════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════ */
.footer {
  margin-top: 24px;
  text-align: center;
  animation: fadeIn 1s ease-out 0.8s both;
}

.footer-text {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.footer-brand {
  font-weight: 700;
  color: var(--text-secondary);
}

.sparkle {
  display: inline-block;
  animation: sparkle 2s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ═══════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 380px) {
  .main-container {
    padding: 30px 16px 20px;
  }
  .brand-name {
    font-size: 36px;
  }
  .avatar-container {
    width: 110px;
    height: 110px;
  }
  .gallery-item {
    width: 120px;
    height: 150px;
  }
  .link-btn {
    padding: 14px 18px;
    font-size: 14px;
  }
}

@media (min-width: 768px) {
  .main-container {
    max-width: 520px;
    padding-top: 60px;
  }
}

/* ═══════════════════════════════════════════
   SCROLLBAR STYLING (Desktop)
   ═══════════════════════════════════════════ */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: var(--bg-dark);
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.15);
}
</style>

<script>
/* ═══════════════════════════════════════════
   PARTICLE SYSTEM - Floating particles
   ═══════════════════════════════════════════ */
(function() {
  var canvas = document.getElementById('particles-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animationId;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resize);
  resize();

  function Particle() {
    this.reset();
  }

  Particle.prototype.reset = function() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.color = Math.random() > 0.5 
      ? '230, 57, 70'   // brand red
      : '244, 162, 97'; // brand orange
  };

  Particle.prototype.update = function() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
  };

  Particle.prototype.draw = function() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + this.color + ', ' + this.opacity + ')';
    ctx.fill();
  };

  // Create particles
  var particleCount = Math.min(50, Math.floor((canvas.width * canvas.height) / 15000));
  for (var i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }

  // Draw connecting lines between nearby particles
  function drawLines() {
    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(230, 57, 70, ' + (0.08 * (1 - dist / 120)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(function(p) {
      p.update();
      p.draw();
    });

    drawLines();
    animationId = requestAnimationFrame(animate);
  }

  animate();

  // Cleanup on page hide
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      cancelAnimationFrame(animationId);
    } else {
      animate();
    }
  });
})();

/* ═══════════════════════════════════════════
   VISITOR COUNTER - Simulated live counter
   ═══════════════════════════════════════════ */
(function() {
  var counterEl = document.getElementById('visitor-count');
  var count = 1847;

  // Simulate random visitors
  function updateCounter() {
    var change = Math.random() > 0.7 ? 1 : 0;
    if (change) {
      count++;
      counterEl.textContent = count.toLocaleString('fr-FR');
    }

    // Random next update between 3-15 seconds
    var nextUpdate = Math.random() * 12000 + 3000;
    setTimeout(updateCounter, nextUpdate);
  }

  // Start after initial delay
  setTimeout(updateCounter, 5000);
})();

/* ═══════════════════════════════════════════
   SMOOTH SCROLL BEHAVIOR
   ═══════════════════════════════════════════ */
document.querySelectorAll('.link-btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    // Add ripple effect on click
    var ripple = document.createElement('span');
    ripple.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:ripple 0.6s linear;pointer-events:none;';

    var rect = this.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    ripple.style.width = size + 'px';
    ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';

    this.style.position = 'relative';
    this.style.overflow = 'hidden';
    this.appendChild(ripple);

    setTimeout(function() { ripple.remove(); }, 600);
  });
});

// Add ripple animation keyframes dynamically
var rippleStyle = document.createElement('style');
rippleStyle.textContent = '@keyframes ripple { to { transform: scale(2.5); opacity: 0; } }';
document.head.appendChild(rippleStyle);

/* ═══════════════════════════════════════════
   GALLERY AUTO-SCROLL (optional)
   ═══════════════════════════════════════════ */
(function() {
  var gallery = document.querySelector('.gallery-scroll');
  if (!gallery) return;

  var scrollAmount = 0;
  var scrollDirection = 1;
  var isPaused = false;

  gallery.addEventListener('mouseenter', function() { isPaused = true; });
  gallery.addEventListener('mouseleave', function() { isPaused = false; });
  gallery.addEventListener('touchstart', function() { isPaused = true; }, {passive: true});
  gallery.addEventListener('touchend', function() {
    setTimeout(function() { isPaused = false; }, 3000);
  }, {passive: true});

  function autoScroll() {
    if (!isPaused) {
      scrollAmount += 0.5 * scrollDirection;
      gallery.scrollLeft = scrollAmount;

      if (scrollAmount >= gallery.scrollWidth - gallery.clientWidth) {
        scrollDirection = -1;
      } else if (scrollAmount <= 0) {
        scrollDirection = 1;
      }
    }
    requestAnimationFrame(autoScroll);
  }

  // Start auto-scroll after user sees the page
  setTimeout(function() {
    scrollAmount = gallery.scrollLeft;
    autoScroll();
  }, 3000);
})();
</script>
